name: Deploy

on:
  push:
    branches: [master, staging, development]
  pull_request:
    branches: [master, staging, development]
    types: [opened, synchronize, reopened]

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git for GitHub Actions
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
      - name: Enable Corepack
        run: corepack enable
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install
      
      - name: Run Linter
        run: yarn lint
        continue-on-error: false
      
      - name: Run Tests
        run: yarn test --run
        env:
          CI: true

  Deploy:
    needs: CI
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git for GitHub Actions
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
      - name: Enable Corepack
        run: corepack enable
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install
      
      - name: Build Next.js (export)
        id: build
        run: |
          NEXT_PUBLIC_ENV=${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }} \
          NODE_ENV=production \
          yarn build
          echo "Build completed successfully"
      
      - name: Check Build Output (Next.js 16 Export)
        run: |
          if [ ! -f "out/index.html" ]; then
            echo "❌ Build failed: out/index.html not found"
            ls -la out/
            exit 1
          fi
          echo "✅ Build output validated: index.html found"
          ls -la out/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        id: deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out
          keep_files: true
      
      - name: Output Deploy URL
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/master' ]]; then
            echo "🚀 Production deployed: https://filowannabe.github.io/Filocode/"
          elif [[ ${{ github.ref }} == 'refs/heads/staging' ]]; then
            echo "🚀 Staging deployed: https://filowannabe.github.io/Filocode/"
          fi
